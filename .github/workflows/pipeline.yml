name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Makefile'
      - 'LICENSE'
      - 'README.md'
      - '.mise.toml'
      - '.gitignore'
      - '.env.example'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Makefile'
      - 'LICENSE'
      - 'README.md'
      - '.mise.toml'
      - '.gitignore'
      - '.env.example'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Local name before push
  LOCAL_TAG: local-ramper:latest

jobs:
  build:
    name: Build & Save Docker Image
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.versioning.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load external environment variables
        run: cat .env.versions >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_NATIVE_VERSION }}
          cache: 'npm'

      - name: Determine Version Bump
        id: versioning
        run: |
          # Get current version
          CURRENT=$(node -p "require('./package.json').version")
          
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            BUMP="patch"
            if [[ "${{ github.event.head_commit.message }}" == *"#major"* ]]; then
              BUMP="major"
            elif [[ "${{ github.event.head_commit.message }}" == *"#minor"* ]]; then
              BUMP="minor"
            fi
            # Update package.json locally for the docker build
            NEW_VERSION=$(npm version $BUMP --no-git-tag-version)
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            # For PRs or other branches, keep current version
            echo "new_version=v$CURRENT" >> $GITHUB_OUTPUT
          fi

      - name: Build local production image
        run: |
          docker build \
            --build-arg NODE_VERSION=${NODE_IMAGE_VERSION} \
            --build-arg CADDY_VERSION=${CADDY_IMAGE_VERSION} \
            -t ${{ env.LOCAL_TAG }} \
            -f docker/Dockerfile.prod .

      - name: Save image as artifact
        run: docker save ${{ env.LOCAL_TAG }} | gzip > image.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: image.tar.gz

  test:
    name: Playwright E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ramper Environment
        uses: ./.github/actions/setup-ramper-env
        
      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Install Playwright Browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:80
          CI: true

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 7

  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ramper Environment
        uses: ./.github/actions/setup-ramper-env

      - name: Run Lighthouse audit
        run: node scripts/lighthouse-check.mjs
        env:
          LIGHTHOUSE_TARGET: http://127.0.0.1:80

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 7

  sonar:
    name: SonarQube Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Load external environment variables
        run: cat .env.versions >> $GITHUB_ENV
        shell: bash

      - name: Setup Node runtime
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_NATIVE_VERSION }}
          cache: 'npm'

      - name: Install dependencies for a better analysis
        run: npm ci

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v7.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy:
    name: Trivy Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local-ramper:latest
          trivy-config: trivy.yaml

  push-registry:
    name: Publish to Registry
    needs: [build, test, lighthouse, sonar, trivy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load local image
        run: docker load < image.tar.gz

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push
        run: |
          IMG=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          VERSION=${{ needs.build.outputs.new_version }}
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.number }}"
            docker tag ${{ env.LOCAL_TAG }} $IMG:$TAG
            docker push $IMG:$TAG
          else
            # MAIN: Publish with version, latest and SHA
            docker tag ${{ env.LOCAL_TAG }} $IMG:$VERSION
            docker tag ${{ env.LOCAL_TAG }} $IMG:latest
            docker tag ${{ env.LOCAL_TAG }} $IMG:${{ github.sha }}
            docker push $IMG:$VERSION
            docker push $IMG:latest
            docker push $IMG:${{ github.sha }}
          fi

  release:
    name: GitHub Release & Version Sync
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, push-registry]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Load external environment variables
        run: cat .env.versions >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_NATIVE_VERSION }}
          cache: 'npm'

      - name: Sync Version and Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          VERSION=${{ needs.build.outputs.new_version }}
          
          # Update package.json and package-lock.json to match the version used in build
          npm version $VERSION --allow-same-version --no-git-tag-version
          
          git add package.json package-lock.json
          git commit -m "chore(release): $VERSION [skip ci]"
          git tag $VERSION
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.build.outputs.new_version }}
          name: Ramper web ${{ needs.build.outputs.new_version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
