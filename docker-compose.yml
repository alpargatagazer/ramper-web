name: ramper-web

services:
  astro-dev:
    # Service for development
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      # We use same port for host and container
      - "4321:4321"
    volumes:
      - .:/app
      # Named volume for node_modules to allow surgical resets
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    # Enables colored terminal output in container logs
    tty: true

volumes:
  node_modules:
